<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Próximo Lanzamiento</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="background-overlay"></div>
    
    <div class="container">
        <h1 id="title">SALIDA DE ANIVERSARIO</h1>
        <div id="countdown">
            <div class="time-segment">
                <span id="days">00</span>
                <p>Días</p> 
            </div>
            <div class="time-segment">
                <span id="hours">00</span>
                <p>Horas</p>
            </div>
            <div class="time-segment">
                <span id="minutes">00</span>
                <p>Minutos</p>
            </div>
            <div class="time-segment">
                <span id="seconds">00</span>
                <p>Segundos</p>
            </div>
        </div>
        <div id="unlocked-message" class="hidden">
            <h2>¡El restaurante será Ariadna Mérida!</h2>
            <h3><a href="https://www.ariadna.mx/">Página</a></h3>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
